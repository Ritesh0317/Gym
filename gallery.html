<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FitFactory | Gallery</title>
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {
      font-family: 'Montserrat', sans-serif;
      background: #fdfdfd;
      color:#333;
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:20px 40px; background:#222; color:#fff;
    }
    .logo { font-size:1.8rem; font-weight:bold; color:#FFD700; font-family:'Pacifico', cursive; }
    nav a {
      color:#fff; text-decoration:none; margin-left:20px; font-weight:600;
    }
    nav a:hover { color:#FFD700; }

    main {
      flex-grow:1; max-width:1100px; margin:50px auto; padding:0 20px; text-align:center;
    }
    h1 { font-size:2.5rem; margin-bottom:30px; color:#222; }

    .gallery {
      display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
    }
    .gallery img {
      width:100%; height:250px; object-fit:cover; border-radius:12px;
      box-shadow:0 6px 15px rgba(0,0,0,0.1);
      transition:transform 0.3s ease;
    }
    .gallery img:hover { transform:scale(1.05); }

    .nav-buttons {
      display:flex; justify-content:space-between;
      max-width:900px; margin:30px auto 10px; padding:0 20px;
    }
    .btn-nav {
      background:#ff6600; color:white; padding:12px 25px; border-radius:30px;
      text-decoration:none; font-weight:bold; transition:0.3s;
      box-shadow:0 4px 8px rgba(0,0,0,0.2);
    }
    .btn-nav:hover { background:#e65c00; transform:translateY(-2px); }

    footer {
      background:#222; color:#fff; text-align:center;
      padding:15px; margin-top:auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">FitFactory</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="programs.html">Programs</a>
      <a href="schedule.html">Schedule</a>
      <a href="membership.html">Membership</a>
      <a href="trainers.html">Trainers</a>
      <a href="gallery.html">Gallery</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h1>Our Fitness Gallery</h1>
    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1571731956672-bc6b93e6c6b5?auto=format&fit=crop&w=800&q=80" alt="Workout 1">
      <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07c?auto=format&fit=crop&w=800&q=80" alt="Workout 2">
      <img src="https://images.unsplash.com/photo-1594737626072-d4a7c8bb8807?auto=format&fit=crop&w=800&q=80" alt="Workout 3">
      <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=800&q=80" alt="Workout 4">
      <img src="https://images.unsplash.com/photo-1571019613914-85f342c8b45f?auto=format&fit=crop&w=800&q=80" alt="Workout 5">
      <img src="https://images.unsplash.com/photo-1579758629938-03607ccdbaba?auto=format&fit=crop&w=800&q=80" alt="Workout 6">
    </div>
  </main>

  <div class="nav-buttons">
    <a href="trainers.html" class="btn-nav">← Back</a>
    <a href="shop.html" class="btn-nav">Next →</a>
  </div>

  <footer>
    © 2025 FitFactory | Designed by Ritesh Gupta
  </footer>
</body>
</html>
